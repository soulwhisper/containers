---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build stork-alpine image

on:
  push:
    paths:
      - "apps/stork-alpine/Dockerfile"
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Build stork-alpine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          version=$(curl -s https://gitlab.isc.org/isc-projects/stork/-/tags | grep -oP '(?<=tags/)[vV]?[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check GHCR tag
        uses: tyriis/docker-image-tag-exists@v2.1.0
        id: check-tag
        with:
          registry: "ghcr.io"
          repository: "soulwhisper/stork-alpine"
          tag: "${{ steps.get_version.outputs.version }}"

      - name: Build and push image
        if: steps.check-tag.outputs.tag == 'not found'
        uses: docker/build-push-action@v5
        with:
          context: "{{defaultContext}}:apps/stork-alpine"
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/soulwhisper/stork-alpine:${{ steps.get_version.outputs.version }}
            ghcr.io/soulwhisper/stork-alpine:latest

  post-build:
    if: ${{ !cancelled() }}
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check build matrix status
        if: ${{ needs.build.result != 'success' }}
        run: exit 1
      - name: Cleanup images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: stork-alpine
          keep-n-tagged: 3
          delete-untagged: true
          delete-partial-images: true

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
