; supervisord.conf — Hermes Suite process manager.
; Per-service program definitions are included from
; $HERMES_HOME/.supervisor/conf.d/, populated by entrypoint based on
; the HERMES_SERVICES env var.

[supervisord]
nodaemon=true
logfile=%(ENV_HERMES_HOME)s/.supervisor/supervisord.log
pidfile=%(ENV_HERMES_HOME)s/.supervisor/supervisord.pid
childlogdir=%(ENV_HERMES_HOME)s/.supervisor
logfile_maxbytes=10MB
logfile_backups=3

[supervisorctl]
serverurl=unix://%(ENV_HERMES_HOME)s/.supervisor/supervisor.sock

[unix_http_server]
file=%(ENV_HERMES_HOME)s/.supervisor/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[include]
files = %(ENV_HERMES_HOME)s/.supervisor/conf.d/*.conf
